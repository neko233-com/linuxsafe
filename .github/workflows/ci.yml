name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./... -v
      - run: go build -o linuxsafe .

  docker-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [ubuntu, debian, centos, alpine]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f test/docker/Dockerfile.${{ matrix.distro }} -t linuxsafe-test-${{ matrix.distro }} .
      - run: docker run --rm linuxsafe-test-${{ matrix.distro }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
